<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGENDA — Agenda partagé</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Agenda" />
  <link rel="stylesheet" href="styles.css?v=45" />
</head>
<body>
  <div class="app">
    <!-- ===== Top bar ===== -->
    <header class="topbar">
      <button class="menu-btn" id="menu-btn" title="Menu" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="17" x2="20" y2="17"></line></svg>
      </button>
      <div class="brand">
        <div class="brand-mark">A</div>
        <span>AGENDA</span>
        <span class="brand-sub">partagé</span>
      </div>

      <div class="nav">
        <button class="today-btn" id="nav-today" title="Aller à aujourd'hui (T)">Aujourd'hui</button>
        <button class="icon" id="nav-prev" title="Mois précédent (←)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <button class="icon" id="nav-next" title="Mois suivant (→)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>

      <div class="title-month" id="title-month">—</div>

      <div class="spacer"></div>

      <div class="view-toggle" id="view-toggle" title="Vue">
        <button data-view="month" class="active">Mois</button>
        <button data-view="week">Semaine</button>
        <button data-view="day">Jour</button>
      </div>

      <button class="add-btn" id="new-event" title="Nouvel événement (N)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Nouvel événement
      </button>
    </header>

    <!-- ===== Mobile "qui es-tu" banner ===== -->
    <div id="me-banner" class="hidden" style="background:#f0f4ff; border-bottom:1px solid #c7d4f7; padding:10px 16px; gap:10px; align-items:center; justify-content:center; flex-direction:column;">
      <span style="font-size:12px; font-weight:600; color:#333;">Qui es-tu ?</span>
      <div class="me-banner-btns" style="display:flex; gap:10px;"></div>
    </div>

    <!-- ===== Mobile notif banner ===== -->
    <div id="notif-banner" style="background:#fff8e1; border-bottom:1px solid #ffe082; padding:8px 16px; font-size:12px; text-align:center; cursor:pointer; gap:6px; align-items:center; justify-content:center;">
      🔔 <span>Appuie ici pour activer les notifications</span>
    </div>

    <!-- ===== Mobile view strip ===== -->
    <div class="mobile-view-strip" id="mobile-view-strip">
      <div class="pill">
        <button data-view="month" class="active">Mois</button>
        <button data-view="week">Semaine</button>
      </div>
      <button class="pill-today" id="strip-today">Aujourd'hui</button>
    </div>

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
      <section class="mini-cal">
        <div class="mini-cal-head">
          <div class="mini-cal-title" id="mini-title">—</div>
          <div class="mini-cal-nav">
            <button id="mini-prev" title="Précédent">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <button id="mini-next" title="Suivant">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
          </div>
        </div>
        <div class="mini-grid" id="mini-grid"></div>
      </section>

      <section id="me-section">
        <div class="section-title"><span>Je suis</span></div>
        <div class="me-list" id="me-list"></div>
      </section>

      <section>
        <div class="section-title">
          <span>Personnes</span>
        </div>
        <div class="people-list" id="people-list"></div>
      </section>

      <div id="notif-btn-wrap" class="hidden" style="padding: 0 12px 12px;">
        <button id="notif-btn" style="width:100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--line); background: var(--bg); color: var(--ink); font-size: 12px; cursor: pointer;">
          🔔 Activer les notifications
        </button>
      </div>

      <div class="legend-note">
        Cliquez sur la pastille pour changer la couleur, ou sur une journée pour ajouter un événement. Glissez-déposez un événement vers une autre date.
      </div>
    </aside>

    <!-- ===== Calendar grid ===== -->
    <main class="calendar-wrap" id="calendar-wrap">
      <!-- Month view -->
      <div class="view view-month" id="view-month">
        <div class="dow-row" id="dow-row"></div>
        <div class="month-grid" id="month-grid"></div>
      </div>
      <!-- Week view -->
      <div class="view view-week" id="view-week" style="display:none;">
        <div class="week-head" id="week-head"></div>
        <div class="week-allday" id="week-allday"></div>
        <div class="week-body" id="week-body"></div>
      </div>
      <!-- Day view -->
      <div class="view view-day" id="view-day" style="display:none;">
        <div class="day-head" id="day-head"></div>
        <div class="day-allday" id="day-allday"></div>
        <div class="day-body" id="day-body"></div>
      </div>
    </main>
    <div class="sidebar-scrim" id="sidebar-scrim"></div>
  </div>

  <div class="cmd-hint"><kbd>N</kbd> nouveau · <kbd>←</kbd>/<kbd>→</kbd> mois · <kbd>T</kbd> aujourd'hui</div>


  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="app.js?v=45"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(console.warn);
    }
  </script>
</body>
</html>
